site_name: LearnWithMithran — Azure Complete Beginner's Guide
site_description: A complete beginner's guide to Azure Cloud and Azure DevOps — 29 days, zero assumed cloud knowledge.
site_url: https://iam-mithran.github.io/LWM-Azure/
repo_url: https://github.com/Iam-mithran/LWM-Azure
repo_name: Iam-mithran/LWM-Azure

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - "Phase 0 — Foundations":
      - "Day 1 — Account Setup & Free Tier": day01_account_setup.md
      - "Day 2 — Core Concepts & Portal": day02_fundamentals.md
  - "Phase 1 — Compute":
      - "Day 3 — Virtual Machines Part 1": day03_vms_part1.md
      - "Day 4 — Web Servers on Azure VMs: Architecture + IIS & Nginx": day04_web_hosting_architecture.md
      - "Day 5 — VM Management, Availability, Bastion & Backup": day05_vms_part3.md
      - "Day 6 — Azure App Service: Deploy Web Apps Without Managing Servers": day06_app_service.md
