site_name: LearnWithMithran — Azure Complete Beginner's Guide
site_description: A complete beginner's guide to Azure Cloud and Azure DevOps — 29 days, zero assumed cloud knowledge.
site_url: https://iam-mithran.github.io/LWM-Azure/
repo_url: https://github.com/Iam-mithran/LWM-Azure
repo_name: Iam-mithran/LWM-Azure

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - "Phase 0 — Foundations":
      - "Day 1 — Account Setup & Free Tier": day01_account_setup.md
      - "Day 2 — Core Concepts & Portal": day02_fundamentals.md
  - "Phase 1 — Compute":
      - "Day 3 — Virtual Machines Part 1": day03_vms_part1.md
      - "Day 4 — Virtual Machines Part 2: Management, VMSS & Backups": day04_vms_part2.md
      - "Day 5 — Azure App Service": day05_app_service.md
      - "Day 6 — Azure Functions": day06_functions.md
  - "Phase 2 — Networking":
      - "Day 7 — Virtual Network + DNS": day07_virtual_network.md
      - "Day 8 — Load Balancer & VMSS": day08_load_balancer.md
      - "Day 9 — VPN & ExpressRoute": day09_vpn_expressroute.md
  - "Phase 3 — Storage, Databases & Global Delivery":
      - "Day 10 — Storage Accounts": day10_storage_account.md
      - "Day 11 — Azure SQL + Other Databases": day11_sql_database.md
      - "Day 12 — Application Gateway & WAF": day12_application_gateway.md
      - "Day 13 — Traffic Manager, Front Door & CDN": day13_traffic_frontdoor_cdn.md
  - "Phase 4 — Identity, Security & Monitoring":
      - "Day 14 — Microsoft Entra ID": day14_entra_id.md
      - "Day 15 — RBAC": day15_rbac.md
      - "Day 16 — Key Vault": day16_key_vault.md
      - "Day 17 — Azure Monitor": day17_azure_monitor.md
  - "Phase 5 — Azure DevOps":
      - "Day 18 — DevOps Intro": day18_devops_intro.md
      - "Day 19 — Azure Repos": day19_azure_repos.md
      - "Day 20 — Pipelines: CI": day20_pipelines_ci.md
      - "Day 21 — Pipelines: CD": day21_pipelines_cd.md
      - "Day 22 — Artifacts": day22_artifacts.md
  - "Phase 6 — Infrastructure as Code":
      - "Day 23 — ARM & Bicep": day23_arm_bicep.md
      - "Day 24 — Terraform": day24_terraform.md
  - "Phase 7 — Containers & AKS":
      - "Day 25 — ACR & Docker": day25_acr_docker.md
      - "Day 26 — AKS Setup": day26_aks_setup.md
      - "Day 27 — AKS Advanced": day27_aks_advanced.md
  - "Phase 8 — Capstone Project":
      - "Day 28 — Capstone Part 1": day28_capstone_part1.md
      - "Day 29 — Capstone Part 2": day29_capstone_part2.md
  - "Optional Bonus":
      - "Day 30 — Cosmos DB (Optional)": day30_cosmos_db_optional.md
